

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: watchnt_backend
    ports:
      - "8000:8000"
    volumes:
      - ./meetings:/app/meetings
      - ./data:/app/data
    environment:
      - OLLAMA_URL=http://host.docker.internal:11434/api/generate
      - DATABASE_URL=sqlite:////app/data/watchnt.db
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: watchnt_frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped
